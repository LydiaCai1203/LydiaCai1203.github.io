#################### default parameters ############################
# favicon module
favicon = "images/favicon.png"
# logo module
logo = "images/logo.png"
logo_darkmode = "images/logo-darkmode.png"
logo_width = "160px"
logo_height = "32px"
logo_webp = true
# logo text will only show when logo is missing.
logo_text = "三观已坏"
# navbar fixed to top
navbar_fixed = true
# theme-mode
theme_switcher = true
theme_default = "system" # available options [light/dark/system]
# Main Sections
mainSections = ["blog"]
# contact form action
contact_form_action = "#"
# google tag manager
google_tag_manager = ""
google_adsense = ""
# custom script on header
custom_script = ""
# copyright
copyright = "Designed & Developed by 阿菜"

# Preloader
[preloader]
enable = false
preloader = ""

# Navigation button
[navigation_button]
enable = true
label = "GitHub"
link = "https://github.com/LydiaCai1203"

# search
[search]
enable = true
primary_color = "#121212"
include_sections = ["blog"]
show_image = true
show_description = true
show_tags = true
show_categories = true

# announcement
[announcement]
enable = false
expire_days = 7
content = ""

# seo meta data for OpenGraph / Twitter Card
[metadata]
keywords = ["博客", "技术", "读书笔记"]
description = "三观已坏 - 技术、读书笔记、生活随笔"
author = "阿菜"
twitter = ""
image = "images/og-image.png"

# site verifications
[site_verification]
google = ""
bing = ""
baidu = ""
facebook = ""
mastodon = ""

# cookies
[cookies]
enable = false
expire_days = 60
content = "This site uses cookies. By continuing to use this website, you agree to their use."
button = "I Accept"

# diagrams
[mermaid]
js_url = 'https://cdn.jsdelivr.net/npm/mermaid@latest/dist/mermaid.esm.min.mjs'

######################## sidebar widgets #########################
[widgets]
sidebar = ["categories", "tags"]

# google map
[google_map]
enable = false
map_api_key = ""
map_latitude = ""
map_longitude = ""
map_marker = "images/marker.png"

# Subscription
[subscription]
enable = false
mailchimp_form_action = ""
mailchimp_form_name = ""
